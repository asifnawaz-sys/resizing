name: Build Mac App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install pyinstaller pillow pandas

      - name: Build with PyInstaller
        run: |
          python3 -m PyInstaller --noconsole --onefile --name "UltraResizer_v1.4_Mac" resizer_final.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacOS_App
          path: dist/UltraResizer_v1.4_Mac
