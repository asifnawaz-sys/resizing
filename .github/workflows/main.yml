import os
import threading
import queue
import io
import concurrent.futures
import gc
import subprocess
import sys

def install_and_import(package, import_name=None):
    if import_name is None: import_name = package
    try:
        __import__(import_name)
    except ImportError:
        subprocess.check_call([sys.executable, "-m", "pip", "install", package])

install_and_import("customtkinter", "customtkinter")
install_and_import("Pillow", "PIL")
import customtkinter as ctk
from PIL import Image, ImageOps, ImageFilter
from tkinter import filedialog, messagebox

ctk.set_appearance_mode("dark")
ctk.set_default_color_theme("green")

# UI Colors
GREEN, GREEN_DARK, BG_DARK = "#1DB954", "#0F6E56", "#0D1117"
BG_CARD, BG_INPUT, BORDER = "#161B22", "#1C2333", "#30363D"
TEXT_MAIN, TEXT_MUTED = "#F0F6FC", "#8B949E"
BLUE_ASIF, ORANGE_SIAR = "#38bdf8", "#f97316"

# ══════════════════════════════════════════════════════════════════════════
#  IMAGE ENGINE FUNCTIONS
# ══════════════════════════════════════════════════════════════════════════

def make_tiled_bg(img, target_w, target_h, tile_size=500):
    cx, cy = max(0, (img.width-tile_size)//2), max(0, (img.height-tile_size)//2)
    s = img.crop((cx, cy, min(img.width, cx+tile_size), min(img.height, cy+tile_size)))
    if s.width < 10 or s.height < 10: return Image.new("RGB", (target_w, target_h), (30, 30, 30))
    tw, th = s.width, s.height
    tile = Image.new("RGB", (tw*2, th*2))
    tile.paste(s, (0, 0)); tile.paste(ImageOps.mirror(s), (tw, 0))
    tile.paste(ImageOps.flip(s), (0, th)); tile.paste(ImageOps.mirror(ImageOps.flip(s)), (tw, th))
    tile = tile.filter(ImageFilter.GaussianBlur(radius=2))
    bg = Image.new("RGB", (target_w, target_h))
    for x in range(0, target_w, tile.width):
        for y in range(0, target_h, tile.height): bg.paste(tile, (x, y))
    return bg

def place_contain(img, target_w, target_h):
    bg = make_tiled_bg(img, target_w, target_h)
    fg = img.copy(); fg.thumbnail((target_w, target_h), Image.Resampling.LANCZOS)
    bg.paste(fg, ((target_w - fg.width)//2, (target_h - fg.height)//2))
    return bg

def place_cover(img, target_w, target_h):
    r, tr = img.width/img.height, target_w/target_h
    nw, nh = (target_w, round(target_w/r)) if r < tr else (round(target_h*r), target_h)
    resized = img.resize((nw, nh), Image.Resampling.LANCZOS)
    return resized.crop(((nw-target_w)//2, (nh-target_h)//2, (nw+target_w)//2, (nh+target_h)//2))

def smart_crop(img, target_w, target_h):
    r, tr = img.width/img.height, target_w/target_h
    nw, nh = (target_w, round(target_w/r)) if r < tr else (round(target_h*r), target_h)
    resized = img.resize((nw, nh), Image.Resampling.LANCZOS)
    edges = resized.convert("L").filter(ImageFilter.FIND_EDGES)
    b = edges.getbbox(); cx, cy = (b[0]+b[2])//2 if b else nw//2, (b[1]+b[3])//2 if b else nh//2
    return resized.crop((max(0, min(cx-target_w//2, nw-target_w)), max(0, min(cy-target_h//2, nh-target_h)), max(0, min(cx-target_w//2, nw-target_w))+target_w, max(0, min(cy-target_h//2, nh-target_h))+target_h))

def smart_save(img, path, fmt, max_bytes):
    f = fmt.upper()
    if f in ("PNG", "TIFF"): img.save(path, f); return os.path.getsize(path) <= max_bytes, os.path.getsize(path)
    l, h, bq = 30, 95, 85
    for _ in range(8):
        m = (l+h)//2; buf = io.BytesIO(); img.save(buf, f, quality=m, optimize=True)
        if buf.tell() <= max_bytes: bq, l = m, m+1
        else: h = m-1
    img.save(path, f, quality=bq, optimize=True); return os.path.getsize(path) <= max_bytes, os.path.getsize(path)

# ══════════════════════════════════════════════════════════════════════════
#  WORKER & BUILDER LOGIC
# ══════════════════════════════════════════════════════════════════════════

msg_queue = queue.Queue()

def build_exe():
    try:
        msg_queue.put(("status", "📦 Installing PyInstaller...", "#38bdf8"))
        subprocess.check_call([sys.executable, "-m", "pip", "install", "pyinstaller"])
        script_path = os.path.abspath(__file__)
        msg_queue.put(("status", "🏗️ Building EXE...", "#38bdf8"))
        cmd = [sys.executable, "-m", "PyInstaller", "--noconsole", "--onefile", "--collect-all", "customtkinter", "--name", "Siar_Digital_Resizer", script_path]
        subprocess.check_call(cmd)
        msg_queue.put(("done_exe", "App created in 'dist' folder!"))
    except Exception as e: msg_queue.put(("error", "Build Failed", str(e)))

def process_file(fn, inp, tw, th, out, mode, fmt, mb, emap):
    try:
        with Image.open(os.path.join(inp, fn)) as im:
            im = im.convert("RGB")
            if mode == "contain": res = place_contain(im, tw, th)
            elif mode == "cover": res = place_cover(im, tw, th)
            else: res = smart_crop(im, tw, th)
        op = os.path.join(out, f"{os.path.splitext(fn)[0]}_resized.{emap.get(fmt, 'webp')}")
        ok, sz = smart_save(res, op, fmt, mb)
        return ("progress", fn, round(sz/1024), ok)
    except Exception as e: return ("error", fn, str(e))

def worker(inp, tw, th, out, mode, fmt, mb):
    exts = ('.jpg','.jpeg','.png','.webp','.tiff','.bmp')
    files = [f for f in os.listdir(inp) if f.lower().endswith(exts)]
    if not files: msg_queue.put(("done", 0)); return
    emap, total, done = {"webp":"webp","jpeg":"jpg","png":"png","tiff":"tiff"}, len(files), 0
    with concurrent.futures.ThreadPoolExecutor() as ex:
        futures = {ex.submit(process_file, f, inp, tw, th, out, mode, fmt, mb, emap): f for f in files}
        for fut in concurrent.futures.as_completed(futures):
            done += 1
            r = fut.result()
            if r[0] == "progress": msg_queue.put(("progress", done, total, r[1], r[2], r[3]))
            if done % 10 == 0: gc.collect()
    msg_queue.put(("done", total))

# ══════════════════════════════════════════════════════════════════════════
#  FIXED SCREEN-FIT GUI
# ══════════════════════════════════════════════════════════════════════════

class App(ctk.CTk):
    def __init__(self):
        super().__init__()
        self.title("Image Resizer by Siar Digital")
        self.configure(fg_color=BG_DARK)
        
        # Screen Fit Geometry
        self.geometry("580x820")
        self.resizable(False, False) # Screen fit fix
        
        self.main_frame = ctk.CTkFrame(self, fg_color=BG_DARK)
        self.main_frame.pack(fill="both", expand=True, padx=10, pady=5)

        self._build_ui()
        self.poll_queue()

    def _build_ui(self):
        # Compact Header
        f_head = ctk.CTkFrame(self.main_frame, fg_color=BG_CARD, corner_radius=12, border_color=BORDER, border_width=1)
        f_head.pack(fill="x", pady=(5, 10))
        ctk.CTkLabel(f_head, text="Image Resizer by Siar Digital", font=("Segoe UI", 20, "bold"), text_color=TEXT_MAIN).pack(pady=(10, 0))
        ctk.CTkLabel(f_head, text="Turbo Engine · Zero Distortion", font=("Segoe UI", 11), text_color=TEXT_MUTED).pack(pady=(0, 10))

        # Folder
        self._section_label("INPUT FOLDER")
        f_fold = ctk.CTkFrame(self.main_frame, fg_color="transparent")
        f_fold.pack(fill="x")
        self.folder_var = ctk.StringVar()
        ctk.CTkEntry(f_fold, textvariable=self.folder_var, placeholder_text="Path...", height=38, fg_color=BG_INPUT).pack(side="left", fill="x", expand=True, padx=(0, 5))
        ctk.CTkButton(f_fold, text="Browse", fg_color=GREEN, hover_color=GREEN_DARK, width=80, height=38, command=self._browse).pack(side="left")

        # Dimensions
        self._section_label("OUTPUT DIMENSIONS")
        f_dim = ctk.CTkFrame(self.main_frame, fg_color="transparent")
        f_dim.pack(fill="x")
        self.w_var, self.h_var = ctk.StringVar(value="850"), ctk.StringVar(value="1280")
        ctk.CTkEntry(f_dim, textvariable=self.w_var, width=100, height=38, justify="center", text_color=GREEN).pack(side="left")
        ctk.CTkLabel(f_dim, text=" × ", font=("Segoe UI", 18), text_color=TEXT_MUTED).pack(side="left", padx=5)
        ctk.CTkEntry(f_dim, textvariable=self.h_var, width=100, height=38, justify="center", text_color=GREEN).pack(side="left")

        # Modes (More compact)
        self._section_label("PLACEMENT MODE")
        self.fit_var = ctk.StringVar(value="contain")
        for val, title in [("contain", "No Squeeze (Mirror BG)"), ("cover", "Fill & Crop"), ("smartcrop", "Smart AI Crop")]:
            rb = ctk.CTkRadioButton(self.main_frame, text=title, variable=self.fit_var, value=val, fg_color=GREEN, font=("Segoe UI", 12))
            rb.pack(anchor="w", padx=10, pady=2)

        # Format & Slider
        self._section_label("FORMAT & MAX KB")
        f_fmt = ctk.CTkFrame(self.main_frame, fg_color="transparent")
        f_fmt.pack(fill="x")
        self.fmt_var = ctk.StringVar(value="webp")
        for f in ["webp", "jpeg", "png"]:
            ctk.CTkRadioButton(f_fmt, text=f.upper(), variable=self.fmt_var, value=f, fg_color=GREEN, width=80).pack(side="left")
        
        self.size_slider = ctk.CTkSlider(self.main_frame, from_=200, to=1500, progress_color=GREEN, button_color=GREEN)
        self.size_slider.set(1500); self.size_slider.pack(fill="x", pady=10)

        # Progress
        self.progress_bar = ctk.CTkProgressBar(self.main_frame, height=8, progress_color=GREEN); self.progress_bar.set(0); self.progress_bar.pack(fill="x", pady=(10, 5))
        self.status_var = ctk.StringVar(value="Ready")
        ctk.CTkLabel(self.main_frame, textvariable=self.status_var, font=("Segoe UI", 10), text_color=TEXT_MUTED).pack()

        # Buttons
        self.start_btn = ctk.CTkButton(self.main_frame, text="▶ START TURBO PROCESSING", font=("Segoe UI", 15, "bold"), fg_color=GREEN, hover_color=GREEN_DARK, height=48, command=self.start)
        self.start_btn.pack(fill="x", pady=(10, 5))
        self.build_btn = ctk.CTkButton(self.main_frame, text="📦 GENERATE APP (EXE)", fg_color="#1e293b", border_color=GREEN, border_width=1, height=35, command=self.start_build)
        self.build_btn.pack(fill="x", pady=5)

        # Colored Footer (Perfectly Aligned)
        f_foot = ctk.CTkFrame(self.main_frame, fg_color="transparent")
        f_foot.pack(pady=(15, 0))
        ctk.CTkLabel(f_foot, text="Created by", font=("Segoe UI", 10), text_color="#484F58").pack(side="left", padx=3)
        ctk.CTkLabel(f_foot, text="Asif Nawaz", font=("Segoe UI", 15, "bold"), text_color=BLUE_ASIF).pack(side="left")
        ctk.CTkLabel(f_foot, text="|", font=("Segoe UI", 12), text_color="#484F58").pack(side="left", padx=5)
        ctk.CTkLabel(f_foot, text="Siar Digital", font=("Segoe UI", 15, "bold"), text_color=ORANGE_SIAR).pack(side="left")
        ctk.CTkLabel(f_foot, text="© 2026", font=("Segoe UI", 10), text_color="#484F58").pack(side="left", padx=3)

    def _section_label(self, txt):
        ctk.CTkLabel(self.main_frame, text=txt, font=("Segoe UI", 10, "bold"), text_color=TEXT_MUTED).pack(anchor="w", pady=(10, 2))

    def _browse(self):
        path = filedialog.askdirectory()
        if path: self.folder_var.set(path)

    def start(self):
        folder = self.folder_var.get().strip()
        if not folder or not os.path.isdir(folder): return
        out_dir = os.path.join(folder, "Siar_Output")
        os.makedirs(out_dir, exist_ok=True)
        self.start_btn.configure(state="disabled")
        threading.Thread(target=worker, args=(folder, int(self.w_var.get()), int(self.h_var.get()), out_dir, self.fit_var.get(), self.fmt_var.get(), int(self.size_slider.get())*1024), daemon=True).start()

    def start_build(self):
        self.build_btn.configure(state="disabled")
        threading.Thread(target=build_exe, daemon=True).start()

    def poll_queue(self):
        try:
            while True:
                m = msg_queue.get_nowait()
                if m[0] == "progress":
                    self.progress_bar.set(m[1]/m[2])
                    self.status_var.set(f"Doing: {m[1]}/{m[2]}")
                elif m[0] == "status": self.status_var.set(m[1])
                elif m[0] == "done_exe": 
                    self.build_btn.configure(state="normal")
                    messagebox.showinfo("Success", m[1])
                elif m[0] == "done":
                    self.start_btn.configure(state="normal")
                    messagebox.showinfo("Siar Digital", "Done!")
        except queue.Empty: pass
        self.after(100, self.poll_queue)

if __name__ == "__main__":
    App().mainloop()
