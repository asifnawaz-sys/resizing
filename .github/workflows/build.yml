name: Build Siar Resizer Mac
on: [push]

jobs:
  build_mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install customtkinter pillow pyinstaller
      - name: Build App
        run: |
          pyinstaller --noconsole --onefile --windowed --name "SiarResizer" resizer_final.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiarResizer-Mac-App
          path: dist/SiarResizer
